<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0B2545 0%, #13315C 100%);
    font-family: 'Inter', -apple-system, sans-serif;
    color: #FFFFFF;
    position: relative;
    overflow: hidden;
    padding: 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .decor {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    gap: 10px;
    opacity: 0.12;
  }
  .decor div { width: 6px; background: #FCA311; }
  .decor div:nth-child(1) { height: 280px; }
  .decor div:nth-child(2) { height: 200px; margin-top: 40px; }
  .decor div:nth-child(3) { height: 260px; margin-top: 10px; }
  .brand {
    font-size: 32px;
    font-weight: 700;
    color: #FCA311;
    letter-spacing: 0.5px;
  }
  .headline {
    font-size: {{FONT_SIZE}}px;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -1px;
    max-width: 900px;
    color: #FFFFFF;
  }
  .tagline {
    font-size: 26px;
    font-weight: 600;
    color: #FCA311;
    letter-spacing: 0.3px;
  }
  .url {
    font-size: 22px;
    font-weight: 400;
    color: #C9D5E5;
    letter-spacing: 0.4px;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
</style>
</head>
<body>
  <div class="decor"><div></div><div></div><div></div></div>
  <div class="brand">AICloudStrategist</div>
  <div class="headline">{{HEADLINE}}</div>
  <div class="footer">
    <div>
      <div class="tagline">Founder-led. Enterprise-reviewed.</div>
      <div class="url">aicloudstrategist.com</div>
    </div>
  </div>
</body>
</html>
