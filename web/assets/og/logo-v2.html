<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 512px;
    height: 512px;
    background: #0B2545;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle gradient accent in corner */
  body::before {
    content: '';
    position: absolute;
    top: -180px;
    right: -180px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(252, 163, 17, 0.18) 0%, transparent 65%);
    border-radius: 50%;
  }

  body::after {
    content: '';
    position: absolute;
    bottom: -200px;
    left: -200px;
    width: 450px;
    height: 450px;
    background: radial-gradient(circle, rgba(91, 141, 239, 0.14) 0%, transparent 60%);
    border-radius: 50%;
  }

  .logo-wrap {
    position: relative;
    z-index: 2;
    text-align: center;
  }

  /* The mark — stylised cloud with upward arrow */
  .mark {
    width: 180px;
    height: 120px;
    margin: 0 auto 32px;
    position: relative;
  }

  .cloud {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #FCA311 0%, #F77F00 100%);
    border-radius: 60px 60px 50% 50%;
    box-shadow:
      0 20px 50px rgba(252, 163, 17, 0.35),
      inset 0 -4px 12px rgba(0, 0, 0, 0.1);
  }

  .cloud::before {
    content: '';
    position: absolute;
    top: -30px;
    left: 30px;
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #FCA311 0%, #F77F00 100%);
    border-radius: 50%;
  }

  .cloud::after {
    content: '';
    position: absolute;
    top: -20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, #FCA311 0%, #F77F00 100%);
    border-radius: 50%;
  }

  /* Arrow piercing through */
  .arrow {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 90px;
    z-index: 3;
  }

  .arrow-body {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 10px;
    height: 72px;
    background: #0B2545;
    border-radius: 5px;
  }

  .arrow-head {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 26px solid #0B2545;
  }

  .wordmark {
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1;
  }

  .wordmark .ai {
    font-size: 56px;
    color: #FCA311;
    font-weight: 900;
    letter-spacing: -2px;
  }

  .wordmark .rest {
    font-size: 44px;
    color: #FFFFFF;
    font-weight: 700;
    letter-spacing: -1px;
    margin-top: 4px;
  }

  .tagline {
    margin-top: 22px;
    font-size: 13px;
    font-weight: 700;
    color: #FCA311;
    letter-spacing: 2.4px;
    text-transform: uppercase;
    opacity: 0.92;
  }
</style>
</head>
<body>
  <div class="logo-wrap">
    <div class="mark">
      <div class="cloud"></div>
      <div class="arrow">
        <div class="arrow-head"></div>
        <div class="arrow-body"></div>
      </div>
    </div>
    <div class="wordmark">
      <div class="ai">AI</div>
      <div class="rest">CloudStrategist</div>
    </div>
    <div class="tagline">Founder-led · Enterprise-reviewed</div>
  </div>
</body>
</html>
